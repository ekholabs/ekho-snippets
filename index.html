<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKHO Snippets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <header class="text-center py-12">
            <h1 class="text-4xl font-bold text-emerald-700 mb-4">EKHO Snippets</h1>
            <p class="text-emerald-600 text-lg">A collection of useful code snippets and tools for the EKHO ecosystem.</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
                <h2 class="text-xl font-semibold text-emerald-700 mb-3">Obsidian Link Converter</h2>
                <p class="text-emerald-600 text-sm mb-4">
                    Convert Obsidian URI links (<code class="bg-emerald-100 px-1 rounded">obsidian://open?vault=...</code>) 
                    into clickable HTML links for web use.
                </p>
                <div class="flex gap-3">
                    <a href="obsidian-link.html" class="text-sm bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg hover:bg-emerald-200 transition-colors">Open Tool</a>
                    <a href="obsidian-link.html" download class="text-sm border border-emerald-200 text-emerald-600 px-4 py-2 rounded-lg hover:bg-emerald-50 transition-colors">Download</a>
                </div>
            </div>
        </main>

        <footer class="text-center py-8 border-t border-emerald-200 mt-12">
            <p class="text-emerald-500 text-sm">More snippets coming soon...</p>
            <p class="text-emerald-500 text-sm mt-2">
                <a href="https://github.com/ekholabs/ekho-snippets" class="hover:text-emerald-700 transition-colors">View on GitHub</a> | 
                <a href="README.md" class="hover:text-emerald-700 transition-colors">README</a>
            </p>
            <p class="text-emerald-400 text-sm mt-4">© EKHO Labs</p>
        </footer>
    </div>
</body>
</html>
