<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Link Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #005a9e;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .instructions {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Obsidian Link Converter</h1>
    <p class="instructions">Paste your Obsidian URI links below (e.g., <code>obsidian://open?vault=MyVault&file=Note</code>). Click the button to convert them into clickable HTML links.</p>
    
    <textarea id="input" placeholder="Paste Obsidian links here... e.g. obsidian://open?vault=MyVault&file=MyNote"></textarea>
    <br>
    <button onclick="convertLinks()">Convert to Clickable Links</button>
    
    <div id="output"></div>
    <p><a href="index.html">← Back to EKHO Snippets</a></p>

    <script>
        function convertLinks() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            // Replace Obsidian URIs with clickable HTML links
            const converted = input.replace(
                /(obsidian:\/\/[^\s]+)/g,
                '<a href="$1" target="_blank">$1</a>'
            );
            
            // Display as HTML
            output.innerHTML = converted || '<em>No Obsidian links found.</em>';
        }
    </script>
</body>
</html>
